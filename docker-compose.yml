version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       meridianrust
      POSTGRES_USER:     meridian
      POSTGRES_PASSWORD: meridian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridianrust"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
